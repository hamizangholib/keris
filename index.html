<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pembayaran QRIS — Hamizan Gholib</title>
<style>
  :root {
    --primary: #2563eb;
    --bg: #ffffff;
    --surface: #f8fafc;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--surface); color: var(--text);
  }
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }
  .card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  h1 { font-size: 1.25rem; margin: 0 0 4px; text-align: center; }
  .merchant { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 4px; }
  .nmid { text-align: center; color: var(--muted); font-size: 0.75rem; margin-bottom: 16px; }
  .qr-wrap {
    display: flex; justify-content: center; align-items: center;
    background: #fff; padding: 14px; border-radius: 10px;
    border: 1px solid var(--border); min-height: 280px;
  }
  #qr-canvas { width: 100%; max-width: 320px; height: auto; image-rendering: pixelated; }
  .qr-placeholder { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 40px 20px; }
  .qr-amount {
    text-align: center; font-size: 1.4rem; font-weight: 700;
    color: var(--primary); margin-top: 12px;
  }
  .qr-note { text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
  label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
  .input-group { margin-bottom: 14px; }
  .input-prefix { position: relative; }
  .input-prefix span {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-weight: 600; pointer-events: none;
  }
  input[type="text"], textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 14px; font-size: 1rem; font-family: inherit;
    background: #fff; color: var(--text); transition: border-color 0.15s;
  }
  .input-prefix input { padding-left: 38px; }
  input:focus, textarea:focus { outline: none; border-color: var(--primary); }
  textarea { resize: vertical; min-height: 70px; }
  button {
    width: 100%; border: none; border-radius: 10px; padding: 14px;
    font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: background 0.15s, transform 0.05s;
  }
  button:active { transform: scale(0.98); }
  .btn-primary { background: var(--primary); color: #fff; margin-bottom: 10px; }
  .btn-wa { background: #25D366; color: #fff; margin-bottom: 10px; }
  .btn-secondary { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
  .error { color: #dc2626; font-size: 0.85rem; margin-bottom: 10px; min-height: 1em; }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #0f172a; color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 0.9rem; opacity: 0; transition: transform 0.25s, opacity 0.25s;
    pointer-events: none; z-index: 10;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .actions-after-qr { display: none; }
  .actions-after-qr.shown { display: block; }
  .footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 8px; }
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Pembayaran QRIS</h1>
      <div class="merchant">digikom HG, Digital &amp; Kreatif</div>
      <div class="nmid">NMID: ID10254525086540 &middot; A01</div>

      <div class="qr-wrap" id="qr-wrap">
        <div class="qr-placeholder" id="qr-placeholder">
          Masukkan nominal pembayaran di bawah, lalu klik <b>Generate QRIS</b>.
          QR yang muncul sudah berisi nominal — saat dipindai, jumlahnya otomatis terisi.
        </div>
        <canvas id="qr-canvas" style="display:none"></canvas>
      </div>
      <div class="qr-amount" id="qr-amount" style="display:none"></div>
      <div class="qr-note" id="qr-note"></div>
    </div>

    <div class="card">
      <div class="input-group">
        <label for="amount">Jumlah Pembayaran</label>
        <div class="input-prefix">
          <span>Rp</span>
          <input type="text" id="amount" inputmode="numeric" placeholder="0" autocomplete="off" />
        </div>
      </div>
      <div class="input-group">
        <label for="note">Keterangan (opsional)</label>
        <textarea id="note" placeholder="Misal: Pembayaran makan siang"></textarea>
      </div>
      <div class="error" id="error"></div>
      <button class="btn-primary" id="btn-generate">⚡ Generate QRIS</button>

      <div class="actions-after-qr" id="actions-after-qr">
        <button class="btn-wa" id="btn-share">📲 Bagikan ke WhatsApp</button>
        <button class="btn-secondary" id="btn-copy">📋 Salin Pesan</button>
      </div>
    </div>

    <div class="footer">Satu QRIS untuk Semua</div>
  </div>

  <div class="toast" id="toast"></div>

      var modPoly = rawPoly.mod(ecPoly);
      ecdata[r] = new Array(ecPoly.getLength() - 1);
      for (var i = 0; i < ecdata[r].length; i++) {
        var idx = i + modPoly.getLength() - ecdata[r].length;
        ecdata[r][i] = idx >= 0 ? modPoly.getAt(idx) : 0;
      }
    }
    var totalCodeCount = 0;
    for (var i = 0; i < rsBlocks.length; i++) totalCodeCount += rsBlocks[i].totalCount;
    var data = new Array(totalCodeCount), index = 0;
    for (var i = 0; i < maxDc; i++)
      for (var r = 0; r < rsBlocks.length; r++)
        if (i < dcdata[r].length) data[index++] = dcdata[r][i];
    for (var i = 0; i < maxEc; i++)
      for (var r = 0; r < rsBlocks.length; r++)
        if (i < ecdata[r].length) data[index++] = ecdata[r][i];
    return data;
  }

  // --- QRCode constructor ---
  return function(typeNumber, ecLevelName) {
    var _typeNumber = typeNumber;
    var _ecLevel = ECLevel[ecLevelName];
    var modules = null, moduleCount = 0, dataCache = null, dataList = [];

    function makeModulesArray(n) {
      var arr = new Array(n);
      for (var i = 0; i < n; i++) { arr[i] = new Array(n); for (var j = 0; j < n; j++) arr[i][j] = null; }
      return arr;
    }
    function setupPositionProbe(row, col) {
      for (var r = -1; r <= 7; r++) {
        if (row + r <= -1 || moduleCount <= row + r) continue;
        for (var c = -1; c <= 7; c++) {
          if (col + c <= -1 || moduleCount <= col + c) continue;
          modules[row+r][col+c] =
            (0 <= r && r <= 6 && (c === 0 || c === 6)) ||
            (0 <= c && c <= 6 && (r === 0 || r === 6)) ||
            (2 <= r && r <= 4 && 2 <= c && c <= 4);
        }
      }
    }
    function setupTimingPattern() {
      for (var r = 8; r < moduleCount - 8; r++) if (modules[r][6] == null) modules[r][6] = (r % 2 === 0);
      for (var c = 8; c < moduleCount - 8; c++) if (modules[6][c] == null) modules[6][c] = (c % 2 === 0);
    }
    function setupPositionAdjustPattern() {
      var pos = getPatternPosition(_typeNumber);
      for (var i = 0; i < pos.length; i++) for (var j = 0; j < pos.length; j++) {
        var row = pos[i], col = pos[j];
        if (modules[row][col] != null) continue;
        for (var r = -2; r <= 2; r++) for (var c = -2; c <= 2; c++)
          modules[row+r][col+c] = (r === -2 || r === 2 || c === -2 || c === 2 || (r === 0 && c === 0));
      }
    }
    function setupTypeNumber(test) {
      var bits = getBCHTypeNumber(_typeNumber);
      for (var i = 0; i < 18; i++) {
        var mod = !test && ((bits >> i) & 1) === 1;
        modules[Math.floor(i/3)][i % 3 + moduleCount - 8 - 3] = mod;
      }
      for (var i = 0; i < 18; i++) {
        var mod = !test && ((bits >> i) & 1) === 1;
        modules[i % 3 + moduleCount - 8 - 3][Math.floor(i/3)] = mod;
      }
    }
    function setupTypeInfo(test, maskPattern) {
      var data = (_ecLevel << 3) | maskPattern;
      var bits = getBCHTypeInfo(data);
      for (var i = 0; i < 15; i++) {
        var mod = !test && ((bits >> i) & 1) === 1;
        if (i < 6) modules[i][8] = mod;
        else if (i < 8) modules[i+1][8] = mod;
        else modules[moduleCount - 15 + i][8] = mod;
      }
      for (var i = 0; i < 15; i++) {
        var mod = !test && ((bits >> i) & 1) === 1;
        if (i < 8) modules[8][moduleCount - i - 1] = mod;
        else if (i < 9) modules[8][15 - i - 1 + 1] = mod;
        else modules[8][15 - i - 1] = mod;
      }
      modules[moduleCount - 8][8] = !test;
    }
    function mapData(data, maskPattern) {
      var inc = -1, row = moduleCount - 1, bitIdx = 7, byteIdx = 0;
      var maskFn = getMaskFunction(maskPattern);
      for (var col = moduleCount - 1; col > 0; col -= 2) {
        if (col === 6) col--;
        while (true) {
          for (var c = 0; c < 2; c++) {
            if (modules[row][col - c] == null) {
              var dark = false;
              if (byteIdx < data.length) dark = ((data[byteIdx] >>> bitIdx) & 1) === 1;
              if (maskFn(row, col - c)) dark = !dark;
              modules[row][col - c] = dark;
              bitIdx--;
              if (bitIdx === -1) { byteIdx++; bitIdx = 7; }
            }
          }
          row += inc;
          if (row < 0 || moduleCount <= row) { row -= inc; inc = -inc; break; }
        }
      }
    }
    function makeImpl(test, maskPattern) {
      moduleCount = _typeNumber * 4 + 17;
      modules = makeModulesArray(moduleCount);
      setupPositionProbe(0, 0);
      setupPositionProbe(moduleCount - 7, 0);
      setupPositionProbe(0, moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);
      if (_typeNumber >= 7) setupTypeNumber(test);
      if (dataCache == null) dataCache = createData(_typeNumber, _ecLevel, dataList);
      mapData(dataCache, maskPattern);
    }
    function getBestMaskPattern() {
      var minLostPoint = 0, bestPattern = 0;
      for (var i = 0; i < 8; i++) {
        makeImpl(true, i);
        var lost = getLostPoint(self);
        if (i === 0 || minLostPoint > lost) { minLostPoint = lost; bestPattern = i; }
      }
      return bestPattern;
    }

    var self = {};
    self.addData = function(data) { dataList.push(Byte8Data(data)); dataCache = null; };
    self.isDark = function(row, col) {
      if (row < 0 || moduleCount <= row || col < 0 || moduleCount <= col)
        throw new Error(row + "," + col);
      return modules[row][col];
    };
    self.getModuleCount = function() { return moduleCount; };
    self.make = function() {
      if (_typeNumber < 1) {
        var t;
        for (t = 1; t < 40; t++) {
          var rsBlocks = getRSBlocks(t, _ecLevel);
          var buf = BitBuffer();
          for (var i = 0; i < dataList.length; i++) {
            var d = dataList[i];
            buf.put(d.getMode(), 4);
            buf.put(d.getLength(), getLengthInBits(d.getMode(), t));
            d.write(buf);
          }
          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) totalDataCount += rsBlocks[i].dataCount;
          if (buf.getLengthInBits() <= totalDataCount * 8) break;
        }
        _typeNumber = t;
      }
      makeImpl(false, getBestMaskPattern());
    };
    return self;
  };
})();
</script>

<script>
  // ===========================================================
  // KONFIGURASI
  // ===========================================================
  // Payload QRIS statis kamu (string lengkap dari QR asli):
  const QRIS_STATIC = "00020101021126610014COM.GO-JEK.WWW01189360091439234344340210G9234344340303UMI51440014ID.CO.QRIS.WWW0215ID10254525086540303UMI5204899953033605802ID5925digikom HG, Digital & Kre6011KOTA BEKASI61051715862070703A01630482E2";

  const MERCHANT_NAME = "Hamizan Gholib (digikom HG, Digital & Kreatif)";

  function buildWaMessage(amountFormatted, note) {
    let msg = "Halo! 😊\n\n";
    msg += "Berikut tagihan pembayaran untuk kamu:\n\n";
    msg += "💰 Jumlah: " + amountFormatted + "\n";
    if (note && note.trim()) msg += "📝 Keterangan: " + note.trim() + "\n";
    msg += "\nTerima kasih! 🙏";
    return msg;
  }
  // ===========================================================

  // ---------- CRC16-CCITT (poly 0x1021, init 0xFFFF) ----------
  function crc16(str) {
    let crc = 0xFFFF;
    for (let i = 0; i < str.length; i++) {
      crc ^= str.charCodeAt(i) << 8;
      for (let j = 0; j < 8; j++) {
        crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
        crc &= 0xFFFF;
      }
    }
    return crc.toString(16).toUpperCase().padStart(4, "0");
  }

  // ---------- Bangun payload dinamis ----------
  function buildDynamicPayload(amount) {
    // 1) Buang CRC lama (tag 6304 + 4 char) dari akhir
    let p = QRIS_STATIC;
    const crcIdx = p.lastIndexOf("6304");
    if (crcIdx !== -1 && crcIdx === p.length - 8) {
      p = p.substring(0, crcIdx);
    }
    // 2) Ubah tag 01 dari 11 (statis) → 12 (dinamis)
    //    Format: "010211" → "010212"
    p = p.replace(/^(00020101)02(\d{2})/, function(m, head, val){
      return head + "0212";
    });
    // 3) Sisipkan tag 54 (transaction amount) tepat sebelum tag 5802
    const amtStr = String(amount);
    const tag54 = "54" + String(amtStr.length).padStart(2, "0") + amtStr;
    const i58 = p.indexOf("5802");
    if (i58 === -1) throw new Error("Tag 5802 tidak ditemukan di payload QRIS");
    p = p.substring(0, i58) + tag54 + p.substring(i58);
    // 4) Tambahkan CRC baru
    const withCrcMarker = p + "6304";
    const crc = crc16(withCrcMarker);
    return withCrcMarker + crc;
  }

  // ---------- Render QR ke canvas ----------
  function renderQR(text) {
    const canvas = document.getElementById("qr-canvas");
    // typeNumber 0 = auto-detect, error correction L cukup utk QRIS
    const qr = qrcode(0, "L");
    qr.addData(text);
    qr.make();
    const count = qr.getModuleCount();
    const scale = 8;
    const margin = 4;
    const size = (count + margin * 2) * scale;
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = "#000";
    for (let r = 0; r < count; r++) {
      for (let c = 0; c < count; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect((c + margin) * scale, (r + margin) * scale, scale, scale);
        }
      }
    }
    canvas.style.display = "block";
    document.getElementById("qr-placeholder").style.display = "none";
  }

  // ---------- UI ----------
  const amountInput = document.getElementById("amount");
  const noteInput = document.getElementById("note");
  const errorEl = document.getElementById("error");
  const btnGenerate = document.getElementById("btn-generate");
  const btnShare = document.getElementById("btn-share");
  const btnCopy = document.getElementById("btn-copy");
  const actionsAfter = document.getElementById("actions-after-qr");
  const qrAmountEl = document.getElementById("qr-amount");
  const qrNoteEl = document.getElementById("qr-note");
  const toast = document.getElementById("toast");

  function formatRupiah(num) {
    if (!num) return "Rp 0";
    return "Rp " + Number(num).toLocaleString("id-ID");
  }
  function getRawAmount() {
    const d = amountInput.value.replace(/\D/g, "");
    return d ? parseInt(d, 10) : 0;
  }
  amountInput.addEventListener("input", () => {
    const d = amountInput.value.replace(/\D/g, "");
    amountInput.value = d ? parseInt(d, 10).toLocaleString("id-ID") : "";
    errorEl.textContent = "";
  });

  let currentAmount = 0;
  let currentNote = "";

  btnGenerate.addEventListener("click", () => {
    const amt = getRawAmount();
    if (!amt || amt <= 0) {
      errorEl.textContent = "Mohon isi jumlah pembayaran terlebih dahulu.";
      amountInput.focus();
      return;
    }
    try {
      const payload = buildDynamicPayload(amt);
      renderQR(payload);
      currentAmount = amt;
      currentNote = noteInput.value;
      qrAmountEl.textContent = formatRupiah(amt);
      qrAmountEl.style.display = "block";
      qrNoteEl.textContent = currentNote.trim() ? currentNote.trim() : "";
      actionsAfter.classList.add("shown");
      errorEl.textContent = "";
    } catch (e) {
      errorEl.textContent = "Gagal membuat QR: " + e.message;
    }
  });

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
  }

  // Ubah canvas QR jadi File PNG (untuk Web Share API)
  function canvasToFile() {
    return new Promise((resolve) => {
      const canvas = document.getElementById("qr-canvas");
      canvas.toBlob((blob) => {
        resolve(new File([blob], "qris-" + currentAmount + ".png", { type: "image/png" }));
      }, "image/png");
    });
  }

  btnShare.addEventListener("click", async () => {
    const msg = buildWaMessage(formatRupiah(currentAmount), currentNote);
    const file = await canvasToFile();

    // 1) Coba Web Share API dengan gambar (didukung di HP modern → bisa pilih WhatsApp)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], text: msg });
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return; // user batal, jangan fallback
      }
    }

    // 2) Fallback (mis. desktop): unduh gambar QR + buka WhatsApp dengan teks
    const a = document.createElement("a");
    a.href = URL.createObjectURL(file);
    a.download = file.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast("QR diunduh — lampirkan ke WhatsApp ✓");
    window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
  });

  btnCopy.addEventListener("click", async () => {
    const msg = buildWaMessage(formatRupiah(currentAmount), currentNote);
    try {
      await navigator.clipboard.writeText(msg);
      showToast("Pesan disalin! ✓");
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = msg;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); showToast("Pesan disalin! ✓"); }
      catch (_) { showToast("Gagal menyalin"); }
      document.body.removeChild(ta);
    }
  });
</script>
</body>
